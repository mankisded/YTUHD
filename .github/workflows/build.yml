name: Build YTUHD for Sideloading

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        # Safely install required tools, including ldid (which the theos installer normally handles)
        brew install meson || true
        brew install ninja || true
        brew install ldid || true
        brew install xz || true

    - name: Set up Theos Environment Manually
      run: |
        # Bypass the buggy install-theos script entirely and just clone the framework directly
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: SDK Caching Setup
      id: sdk-cache
      uses: actions/cache@v4
      with:
        path: ~/theos/sdks
        key: ios-sdks-v4 # Bumped to v4 to guarantee a clean slate

    - name: Download iOS SDK
      if: steps.sdk-cache.outputs.cache-hit != 'true'
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: Download Required Headers
      run: |
        # Download PoomSmart's YouTube and PS headers
        git clone https://github.com/PoomSmart/YouTubeHeader.git ~/theos/include/YouTubeHeader
        git clone https://github.com/PoomSmart/PSHeader.git ~/theos/include/PSHeader
        
        # Download opa334's libundirect headers directly into the include folder
        git clone https://github.com/opa334/libundirect.git ~/theos/include/libundirect

    - name: Compile Tweak Package (Sideload Mode)
      run: |
        export THEOS=$HOME/theos
        git submodule update --init --recursive
        make package SIDELOAD=1 FINALPACKAGE=1

    - name: Compile Tweak Package (Sideload Mode)
      run: |
        export THEOS=$HOME/theos
        # Explicitly update submodules to guarantee libvpx and dav1d exist
        git submodule update --init --recursive
        # Run the sideload compilation
        make package SIDELOAD=1 FINALPACKAGE=1

    - name: Upload Compiled Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YTUHD-Sideload-Package
        path: packages/*.deb