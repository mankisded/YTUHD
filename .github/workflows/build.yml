name: Build YTUHD for Sideloading

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        # Safely install required tools, including ldid (which the theos installer normally handles)
        brew install meson || true
        brew install ninja || true
        brew install ldid || true
        brew install xz || true

    - name: Set up Theos Environment Manually
      run: |
        # Bypass the buggy install-theos script entirely and just clone the framework directly
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: SDK Caching Setup
      id: sdk-cache
      uses: actions/cache@v4
      with:
        path: ~/theos/sdks
        key: ios-sdks-v3 # Bumped to v3 to ensure a completely clean slate

    - name: Download iOS SDK
      if: steps.sdk-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/theos/sdks
        curl -L https://github.com/theos/sdks/releases/download/v1.0/iPhoneOS16.5.sdk.tar.xz -o ~/theos/sdks/iPhoneOS16.5.sdk.tar.xz
        tar -xf ~/theos/sdks/iPhoneOS16.5.sdk.tar.xz -C ~/theos/sdks/
        rm ~/theos/sdks/iPhoneOS16.5.sdk.tar.xz

    - name: Compile Tweak Package (Sideload Mode)
      run: |
        export THEOS=$HOME/theos
        # Explicitly update submodules to guarantee libvpx and dav1d exist
        git submodule update --init --recursive
        # Run the sideload compilation
        make package SIDELOAD=1 FINALPACKAGE=1

    - name: Upload Compiled Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YTUHD-Sideload-Package
        path: packages/*.deb